services:
  # 1. ASP.NET Core Web-App (C# MVC)
  ipa-praesentationsverwaltung:
    image: ${DOCKER_REGISTRY-}ipapraesentationsverwaltung
    build:
      context: .
      dockerfile: IPA-Praesentationsverwaltung/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      # The app reaches the SQL container via the compose service name "sql-db".
      - ConnectionStrings__DefaultConnection=Server=sql-db,1433;Database=IPADatabase;User Id=sa;Password=MeinSicheresPasswort123!;TrustServerCertificate=True;Encrypt=False;
      # E-mail / SMTP. By default the app sends to the local Mailpit test server
      # (no real delivery, view at http://localhost:8025). For production, set
      # these to the school's SMTP server via a .env file (see .env.example).
      - Email__From=${SMTP_FROM:-noreply@wgbs.ch}
      - Email__FromName=${SMTP_FROM_NAME:-Wirtschaftsgymnasium Basel}
      - Email__Smtp__Host=${SMTP_HOST:-mailpit}
      - Email__Smtp__Port=${SMTP_PORT:-1025}
      - Email__Smtp__User=${SMTP_USER:-}
      - Email__Smtp__Password=${SMTP_PASSWORD:-}
      - Email__Smtp__EnableSsl=${SMTP_ENABLE_SSL:-false}
    depends_on:
      sql-db:
        condition: service_healthy
      mailpit:
        condition: service_started

  # 2. Lokale MSSQL Datenbankinstanz (wie im Detailbeschrieb gefordert)
  sql-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql-db-container
    ports:
      - "1433:1433" # Läuft fix auf Port 1433
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=MeinSicheresPasswort123! # Ändere dies bei Bedarf (starkes Passwort!)
    volumes:
      - mssql-data:/var/opt/mssql
    # Health check so the web app only starts once SQL Server accepts connections.
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # 3. Mailpit – lokaler SMTP-Testserver. Fängt alle ausgehenden E-Mails ab und
  #    zeigt sie unter http://localhost:8025 an (kein echter Versand nötig).
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    ports:
      - "8025:8025" # Web-UI zum Anschauen der E-Mails
      - "1025:1025" # SMTP-Port (intern vom Web-App-Container genutzt)
    restart: unless-stopped

volumes:
  mssql-data:
